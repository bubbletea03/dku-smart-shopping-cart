<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART CART</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', monospace, sans-serif;
  background: #0a0e14;
  color: #e2eaf4;
  height: 100vh;
  display: grid;
  grid-template-columns: 1fr 280px;
  grid-template-rows: 1fr 180px;
  gap: 1px;
  background-color: #1a2235;
}

.cam {
  background: #0a0e14;
  position: relative;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}

.zone-line {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  border-top: 1px dashed rgba(255,255,255,0.2);
  pointer-events: none;
  z-index: 10;
}
.zone-line.ab { top: 33.33%; }
.zone-line.bc { top: 66.66%; }

.zone-tag {
  position: absolute;
  left: 10px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  padding: 2px 7px;
  border-radius: 2px;
  z-index: 10;
}
.zone-tag.a { top: 8px; background: rgba(167,139,250,0.2); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); }
.zone-tag.b { top: calc(33.33% + 8px); background: rgba(56,189,248,0.2); color: #38bdf8; border: 1px solid rgba(56,189,248,0.3); }
.zone-tag.c { top: calc(66.66% + 8px); background: rgba(52,211,153,0.2); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }

#overlayCanvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 5;
}

.right {
  background: #0f1520;
  display: flex;
  flex-direction: column;
  border-left: 1px solid #1a2235;
}

.panel-title {
  padding: 10px 12px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: #38bdf8;
  border-bottom: 1px solid #1a2235;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cart-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
  scrollbar-width: thin;
  scrollbar-color: #1a2235 transparent;
}

.cart-empty {
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: #243548;
}

.cart-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 8px;
  margin-bottom: 3px;
  background: #141c28;
  border: 1px solid #1a2235;
  border-radius: 3px;
  animation: slideIn 0.2s ease-out;
}
@keyframes slideIn { from { opacity:0; transform:translateX(8px); } to { opacity:1; transform:none; } }

.item-emoji { font-size: 18px; }
.item-name  { flex: 1; font-size: 12px; font-weight: 500; }
.item-qty   { font-size: 11px; font-weight: 700; color: #38bdf8; min-width: 20px; text-align: center; }
.item-price { font-size: 10px; color: #34d399; }
.item-del   { background: none; border: none; color: #243548; cursor: pointer; font-size: 13px; padding: 2px 4px; }
.item-del:hover { color: #f87171; }

.total-box {
  padding: 10px 12px;
  border-top: 1px solid #1a2235;
}
.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.total-label { font-size: 9px; letter-spacing: 0.15em; color: #5d7a96; }
.total-amount { font-size: 20px; font-weight: 700; color: #34d399; }
.total-won { font-size: 11px; color: #5d7a96; }

.btn-pay {
  width: 100%;
  padding: 8px;
  border-radius: 3px;
  border: 1px solid #34d399;
  background: rgba(52,211,153,0.1);
  color: #34d399;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  cursor: pointer;
  margin-bottom: 4px;
}
.btn-pay:hover { background: rgba(52,211,153,0.2); }

.btn-clear {
  width: 100%;
  padding: 5px;
  border-radius: 3px;
  border: 1px solid #1a2235;
  background: none;
  color: #5d7a96;
  font-size: 9px;
  letter-spacing: 0.12em;
  cursor: pointer;
}
.btn-clear:hover { border-color: #f87171; color: #f87171; }

.log-wrap {
  grid-column: 1 / 3;
  background: #0f1520;
  border-top: 1px solid #1a2235;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.log-head {
  padding: 6px 12px;
  border-bottom: 1px solid #1a2235;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.log-head-title { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; color: #38bdf8; }
.ws-status { font-size: 9px; letter-spacing: 0.1em; color: #243548; }
.ws-status.on { color: #34d399; }

.log-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  scrollbar-width: thin;
  scrollbar-color: #1a2235 transparent;
}

.log-entry {
  display: flex;
  gap: 8px;
  padding: 2px 4px;
  border-radius: 2px;
  font-size: 10px;
  font-family: monospace;
  animation: fadeIn 0.15s ease-out;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.log-time   { color: #243548; flex-shrink: 0; min-width: 56px; }
.log-tag    { font-weight: 700; flex-shrink: 0; min-width: 36px; }
.log-msg    { color: #5d7a96; }

.log-entry.add    { background: rgba(52,211,153,0.05); }
.log-entry.add    .log-tag { color: #34d399; }
.log-entry.remove .log-tag { color: #f87171; }
.log-entry.detect .log-tag { color: #38bdf8; }
.log-entry.detect { background: rgba(56,189,248,0.04); }
.log-entry.info   .log-tag { color: #243548; }
.log-entry.warn   .log-tag { color: #fb923c; }

#toastArea {
  position: fixed;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  pointer-events: none;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.toast {
  padding: 6px 16px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  animation: toastAnim 2s forwards;
}
.toast.add    { background: rgba(52,211,153,0.15); border:1px solid #34d399; color:#34d399; }
.toast.remove { background: rgba(248,113,113,0.15); border:1px solid #f87171; color:#f87171; }
.toast.pay    { background: rgba(56,189,248,0.15);  border:1px solid #38bdf8; color:#38bdf8; }
@keyframes toastAnim {
  0%  { opacity:0; transform:translateY(-6px); }
  15% { opacity:1; transform:translateY(0); }
  75% { opacity:1; }
  100%{ opacity:0; }
}
</style>
</head>
<body>

<!-- 카메라 영역 -->
<div class="cam">
  <img src="/video_feed" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" alt="camera">
  <canvas id="overlayCanvas"></canvas>
  <div class="zone-line ab"></div>
  <div class="zone-line bc"></div>
  <div class="zone-tag a">ZONE A</div>
  <div class="zone-tag b">ZONE B</div>
  <div class="zone-tag c">ZONE C</div>
</div>

<!-- 장바구니 + 총금액 -->
<div class="right">
  <div class="panel-title">
    // 장바구니
    <span id="cartBadge" style="color:#5d7a96;font-size:9px;">0개</span>
  </div>
  <div class="cart-list" id="cartList">
    <div class="cart-empty" id="cartEmpty">비어있음</div>
  </div>
  <div class="total-box">
    <div class="total-row">
      <span class="total-label">총 금액</span>
      <div>
        <span class="total-amount" id="totalAmount">0</span>
        <span class="total-won">원</span>
      </div>
    </div>
    <button class="btn-pay" id="btnPay">결제하기</button>
    <button class="btn-clear" id="btnClear">초기화</button>
  </div>
</div>

<!-- 로그 -->
<div class="log-wrap">
  <div class="log-head">
    <span class="log-head-title">// 감지 로그</span>
    <span class="ws-status" id="wsStatus">● WS OFFLINE</span>
  </div>
  <div class="log-list" id="logList"></div>
</div>

<div id="toastArea"></div>

<script>
const WS_URL = "ws://localhost:8000/ws";
let ws = null;
let cart = [];

/* ── WebSocket 연결 ── */
function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setWsStatus(true);
    addLog("서버 연결됨", "info");
  };

  ws.onclose = () => {
    setWsStatus(false);
    addLog("서버 연결 끊김 — 3초 후 재연결", "warn");
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    addLog("WebSocket 오류", "warn");
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
}

function send(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

/* ── 메시지 처리 ── */
function handleMessage(msg) {
  switch (msg.type) {

    case "cart_init":
    case "cart_update":
      cart = msg.cart;
      renderCart(msg.total);
      break;

    case "item_added":
      cart = msg.cart;
      renderCart(msg.total);
      addLog(msg.log, "add");
      showToast(`+ ${msg.product.emoji} ${msg.product.name}`, "add");
      break;

    case "item_removed":
      cart = msg.cart;
      renderCart(msg.total);
      addLog(msg.log, "remove");
      showToast(`- ${msg.product.emoji} ${msg.product.name} 제거`, "remove");
      break;

    case "detections":
      if (!msg.detections || msg.detections.length === 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      } else {
        drawDetections(msg.detections, msg.frame_w, msg.frame_h);
      }
      break;

    case "checkout_done":
      cart = [];
      renderCart(0);
      addLog(`결제 완료 — ${msg.total.toLocaleString()}원`, "warn");
      showToast(`결제완료 ${msg.total.toLocaleString()}원`, "pay");
      break;
  }
}

/* ── 감지 박스 그리기 ── */
const canvas = document.getElementById("overlayCanvas");
const ctx = canvas.getContext("2d");

// 주기적으로 캔버스 클리어 (감지 없을 때 박스 사라지게)
let lastDetectionTime = Date.now();
setInterval(() => {
  if (Date.now() - lastDetectionTime > 500) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}, 200);

function drawDetections(detections, fw, fh) {
  lastDetectionTime = Date.now();

  const camEl = canvas.parentElement;
  canvas.width  = camEl.clientWidth;
  canvas.height = camEl.clientHeight;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const scaleX = canvas.width  / fw;
  const scaleY = canvas.height / fh;

  const zoneColors = { A: "#a78bfa", B: "#38bdf8", C: "#34d399" };

  for (const d of detections) {
    const [x1, y1, x2, y2] = d.bbox;
    const x = x1 * scaleX, y = y1 * scaleY;
    const w = (x2 - x1) * scaleX, h = (y2 - y1) * scaleY;
    const color = zoneColors[d.zone] || "#ffffff";

    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);

    const txt = `${d.label} ${Math.round(d.conf * 100)}% [${d.zone}]`;
    ctx.font = "bold 11px monospace";
    const tw = ctx.measureText(txt).width;
    ctx.fillStyle = "rgba(10,14,20,0.85)";
    ctx.fillRect(x, y - 18, tw + 8, 16);
    ctx.fillStyle = color;
    ctx.fillText(txt, x + 4, y - 5);
  }
}

/* ── 장바구니 렌더 ── */
function renderCart(total = 0) {
  const totalQty = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById("cartBadge").textContent = `${totalQty}개`;
  document.getElementById("totalAmount").textContent = total.toLocaleString();
  document.getElementById("cartEmpty").style.display = cart.length === 0 ? "flex" : "none";

  document.querySelectorAll(".cart-item").forEach(el => {
    if (!cart.find(i => i.label === el.dataset.label)) el.remove();
  });

  const listEl = document.getElementById("cartList");

  for (const item of cart) {
    let el = listEl.querySelector(`[data-label="${item.label}"]`);
    if (!el) {
      el = document.createElement("div");
      el.className = "cart-item";
      el.dataset.label = item.label;
      el.innerHTML = `
        <span class="item-emoji">${item.emoji}</span>
        <span class="item-name">${item.name}</span>
        <span class="item-qty" data-qty>${item.qty}</span>
        <span class="item-price">${item.price.toLocaleString()}원</span>
        <button class="item-del" data-label="${item.label}">✕</button>`;
      el.querySelector(".item-del").addEventListener("click", () => {
        send({ type: "remove_item", label: item.label });
        addLog(`"${item.name}" 제거 요청`, "remove");
      });
      listEl.insertBefore(el, listEl.firstChild);
    }
    el.querySelector("[data-qty]").textContent = item.qty;
  }
}

/* ── 결제 / 초기화 ── */
document.getElementById("btnPay").addEventListener("click", () => {
  if (cart.length === 0) return;
  send({ type: "checkout" });
});

document.getElementById("btnClear").addEventListener("click", () => {
  send({ type: "clear_cart" });
  addLog("장바구니 초기화", "warn");
});

/* ── 상태 표시 ── */
function setWsStatus(on) {
  const el = document.getElementById("wsStatus");
  el.textContent = on ? "● WS ONLINE" : "● WS OFFLINE";
  el.className = "ws-status" + (on ? " on" : "");
}

/* ── 로그 ── */
function addLog(msg, type = "info") {
  const tags = { add:"ADD", remove:"DEL", info:"SYS", warn:"WARN", detect:"DET" };
  const time = new Date().toLocaleTimeString("ko-KR", { hour12: false });
  const el = document.createElement("div");
  el.className = `log-entry ${type}`;
  el.innerHTML = `
    <span class="log-time">${time}</span>
    <span class="log-tag">${tags[type] || "SYS"}</span>
    <span class="log-msg">${msg}</span>`;
  const list = document.getElementById("logList");
  list.insertBefore(el, list.firstChild);
  if (list.children.length > 40) list.lastChild.remove();
}

/* ── 토스트 ── */
function showToast(msg, type) {
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById("toastArea").appendChild(el);
  setTimeout(() => el.remove(), 2100);
}

/* ── 시작 ── */
addLog("시스템 시작", "info");
connectWS();
</script>
</body>
</html>
